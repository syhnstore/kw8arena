<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gantangan App v3.0</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>
<div id="toast" class="toast">✅ Data berhasil dikirim</div>

<audio id="successSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <h2 class="inputdt">Input Data</h2>

  <form id="form">
    <input type="number" id="gantangan" placeholder="Nomor Gantangan" required>
    
    <select id="kelas" required>
      <option value="">Pilih Kelas</option>
      <option>A</option>
      <option>B</option>
    </select>

    <input type="number" id="merah" placeholder="Stick Merah" required>
    <input type="number" id="biru" placeholder="Stick Biru" required>
    <input type="number" id="kuning" placeholder="Stick Kuning" required>

    <button type="submit">Kirim</button>
  </form>

  <h2 class="savedt">Data Tersimpan</h2>

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Kelas</th>
        <th>Merah</th>
        <th>Biru</th>
        <th>Kuning</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script src="script.js"></script>
</body>
</html>
