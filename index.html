<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KW8 ARENA DIGITAL ASSESSMENT SYSTEM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h2>DIGITAL ASSESSMENT SYSTEM</h2>

<div class="card">
    <div class="flexib">
      <input id="gantangan" type="number" placeholder="No. Gantangan">
      <input id="sesi" type="text" placeholder="Sesi A/B/C">
    </div>

<div class="grid">
  <div>
    <h4 style="color: #fd6060;">MERAH</h4>
     <div class="flexib" style="padding:0px;">
      <input id="inputMerah" type="number" placeholder="Point Kocok">
      <input id="stikMerah" type="number" placeholder="Jumlah Stik">
      <input id="totalMerah" readonly disabled placeholder="Total Point" style="background: #fd6060;">
     </div>
  </div>

  <div>
    <h4 style="color: #6097fd;">BIRU</h4>
    <input disabled placeholder="40" value="40">
    <input id="stikBiru" type="number" placeholder="Jumlah Stik">
    <input id="totalBiru" readonly disabled placeholder="Total Point" style="background: #6097fd;">
  </div>

  <div>
    <h4 style="color: #fde060;">KUNING</h4>
    <input disabled placeholder="10" value="10">
    <input id="stikKuning" type="number" placeholder="Jumlah Stik">
    <input id="totalKuning" readonly disabled placeholder="Total Point" style="background: #fde060;">
  </div>
</div>

<h4>HASIL POINT PESERTA</h4>
<div class="flex">
  <div class="flexib">
    
    <div>
        <h4>JUMLAH POINT</h4>
        <input id="before" readonly disabled placeholder="Jumlah Point">
    </div>

    <div>
        <h4>RESTART KOCOK</h4>
        <input id="inputRestart" type="number" placeholder="Restart Kocok">
    </div>
    
    <div>
        <h4>HASIL POINT</h4>
        <input id="after" readonly disabled placeholder="Hasil Restart">
    </div>

  </div>
</div>

<div class="btn-group">
<button id="btnSave">SIMPAN</button>
<button id="btnReset">BERSIHKAN</button>
</div>
</div>

<h2>DATA PESERTA</h2>
<div class="card">
<select id="dropdown">
<option value="">Pilih Gantangan</option>
</select>
<div id="detail"></div>
<div class="btn-group">
<button id="btnDelete">HAPUS (1X)</button>
<button id="btnClear">HAPUS SEMUA</button>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
